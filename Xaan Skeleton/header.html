<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {

  <style>
    body {
      background-color: #F1EFE9;
      color: #0F0F0F;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
    }
    .grain-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuArQFFj5QyV9_funst1x0hYQAQsS6hFG81ButwSz1XHrfdw16aL-I_cwwfJ7w5XpcveQ7ghpCpdmUSqjgHunUOlx2Q3wkqs6Cilu4ZpA3XeoBpLhwRPp60sKHhGpOy68HZ8jXnz4UJvqLRKLQBcMfbdUuZb1_iNqTiiWUKMFqxK8FFSN6G-czDsh1PGlV1hRO2rITWv-DzWX0VjFtsz5CEfGy9AeLi8a7FlrOEBqUDyrliJeGgjBxZkh_g5GCslgclktEaEq4u2ikrr);
    }
    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(10px, -20px); }
    }
    .floating-circle { animation: float 10s ease-in-out infinite; }
    .dual-button { display: flex; height: 80px; }
    .btn-main {
      background-color: #221854;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 40px;
      position: relative;
      clip-path: polygon(0 0, 95% 0, 100% 100%, 0% 100%);
      transition: all 0.3s ease;
    }
    .btn-secondary {
      background-color: #0F0F0F;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 40px;
      margin-left: -20px;
      transition: all 0.3s ease;
    }
    .cta-polygon { clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%); }
  </style>

<!-- Header Nav -->
<header class="relative flex items-center h-20 border-b border-gray-200">
  <!-- Left: Logo -->
  <div class="flex items-center pl-32 z-10">
    <img alt="XA'AN" class="h-10 w-auto object-contain"
      src="C:\Users\frazi\Desktop\xaan\reference images\xaan logo transp bg.png" />
  </div>

  <!-- Center: Search Bar (absolutely centered in header) -->
  <div class="absolute left-1/2 -translate-x-1/2 w-[580px]">
    <div class="flex items-center bg-white border border-gray-300 rounded-full shadow-sm h-11 overflow-hidden">

      <div class="flex items-center gap-0.5 pl-3 pr-3 border-r border-gray-200 flex-shrink-0">

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#756791" stroke-width="2"

          <circle cx="12" cy="7" r="4" />

      <!-- Search button -->
      <button
        class="h-11 w-11 flex-shrink-0 bg-[#5B25C1] flex items-center justify-center hover:bg-[#221854] transition-colors">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Right: Nav -->

      <li><a class="hover:text-xa-purple transition-colors" href="#">Become a host</a></li>
      <li><a class="hover:text-xa-purple transition-colors" href="#">FAQ</a></li>
